apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  namespace: navidrome
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: navidrome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: navidrome }
  template:
    metadata:
      labels: { app: navidrome }
    spec:
      nodeSelector:
        kubernetes.io/hostname: rp8
      containers:
        - name: navidrome
          image: deluan/navidrome:latest
          ports:
            - containerPort: 4533
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_PORT
              value: "4533"
            - name: ND_LOGLEVEL
              value: info
          volumeMounts:
            - name: music
              mountPath: /music
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /ping, port: 4533 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: music
          nfs:
            server: 192.168.0.103
            path: /mnt/homenas8/ds/music
            readOnly: true
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-data
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace: navidrome
spec:
  selector: { app: navidrome }
  ports:
    - port: 80
      targetPort: 4533
      protocol: TCP
